# stock-price-sheet configuration. Committed so GitHub Actions can read it.
# Contains NO secrets and NO tickers. The spreadsheet_id is just the ID from the
# sheet URL; access is granted by sharing the sheet with the service account.
# Tickers live ONLY in the Ticker column of the private sheet — never in this repo.
spreadsheet_id: "1JkQ25PnxflO86axqflNw1HgAHAMVN4dyiQkj1mmFYgE"
timezone: "Asia/Tokyo"
header_rows: 1

# The holdings tab Track A processes (the literal Japanese tab name in the sheet).
holdings_tab: "保有銘柄"

# ---------------------------------------------------------------------------
# Column mapping is by HEADER NAME (row-1 label), not by position. Each value is
# the exact Japanese header label; the code resolves it to a column at runtime,
# so inserting/moving a column does not break the mapping.
#
# 保有銘柄 columns and owners:
#   銘柄名        manual            stock name
#   取得日        manual            acquisition date
#   短中長期      manual            horizon (AI-comment input)
#   目標売却株価   manual            target sell price (AI-comment input)
#   現在株価      Track A           yfinance currentPrice
#   取得株価      manual            acquisition price
#   取得株数      manual            shares held (used to compute 配当金)
#   配当利回り     Track A           yfinance dividendYield (a percent number, e.g. 2.34)
#   配当金        Track A           dividendRate * 取得株数 = annual dividend received
#   購入理由      manual            purchase reason (AI-comment input)
#   AIコメント     holdings-review   Claude's personalized per-holding comment
#   Ticker        manual            yfinance format (7203.T, AAPL); rows without it are skipped
# ---------------------------------------------------------------------------
columns:
  ticker: "Ticker"             # manual; rows without a ticker are skipped
  name: "銘柄名"               # manual; never written by either track
  shares: "取得株数"           # manual; multiplied by dividendRate for 配当金
  current_price: "現在株価"    # Track A: yfinance currentPrice
  dividend_yield: "配当利回り" # Track A: yfinance dividendYield (percent number)
  dividend_amount: "配当金"    # Track A: dividendRate * shares (total annual dividend)
  horizon: "短中長期"          # manual; AI-comment input
  target_sell: "目標売却株価"  # manual; AI-comment input
  purchase_reason: "購入理由"  # manual; AI-comment input
  ai_comment: "AIコメント"     # holdings-review skill writes this (only)
