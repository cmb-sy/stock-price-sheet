# stock-price-sheet configuration. Committed so GitHub Actions can read it.
# Contains NO secrets and NO tickers. The spreadsheet_id is just the ID from the
# sheet URL; access is granted by sharing the sheet with the service account.
# Tickers live ONLY in the ticker column of the private sheet — never in this repo.
spreadsheet_id: "1JkQ25PnxflO86axqflNw1HgAHAMVN4dyiQkj1mmFYgE"
timezone: "Asia/Tokyo"
header_rows: 1

# Track A (yfinance, via GitHub Actions) processes every ticker found in the
# ticker column of each worksheet below. The tabs share one column layout.
# These are the literal Japanese tab names in the sheet (the sheet stays in
# Japanese); the code references them verbatim, so do not translate them.
watchlists:
  - "保有銘柄"   # holdings
  - "監視-JP"    # JP watchlist
  - "監視-US"    # US watchlist
ticker_column: "AG"   # last column (manual entry, yfinance format)
name_column: "A"      # stock name — manual Japanese name; Track A never writes it

# Track A writes ONLY these yfinance-native Ticker.info fields (no over-fetching,
# no AI). key = field name, value = destination column letter.
# NOTE: column C is the manual "my target price", placed next to B (current price)
# for at-a-glance comparison, so the auto fields below start at D.
fields:
  currentPrice: "B"              # current price
  trailingPE: "D"                # PER
  priceToBook: "E"               # PBR
  dividendYield: "H"             # dividend yield
  marketCap: "I"                 # market cap
  fiftyTwoWeekHigh: "K"          # 52-week high
  fiftyTwoWeekLow: "L"           # 52-week low
  trailingEps: "M"               # EPS (TTM, current)
  targetMeanPrice: "T"           # consensus target (mean)
  targetHighPrice: "U"           # consensus target (high)
  targetLowPrice: "V"            # consensus target (low)
  numberOfAnalystOpinions: "W"   # number of analysts
  recommendationKey: "X"         # rating

# Track A computed fields (derived from yfinance financials/history):
volume_3mo_max_column: "J"   # 3-month max volume = history("3mo")["Volume"].max()
eps_history_columns:         # actual annual EPS, newest first (income_stmt Diluted/Basic EPS)
  - "N"                      # EPS latest FY
  - "O"                      # EPS 1 FY ago
  - "P"                      # EPS 2 FY ago
  - "Q"                      # EPS 3 FY ago
eps_yoy_columns:
  latest: "R"          # EPS YoY (latest)% = (EPS latest - EPS 1 ago) / |EPS 1 ago| * 100
  prev: "S"            # EPS YoY (prev)%   = (EPS 1 ago  - EPS 2 ago) / |EPS 2 ago| * 100

updated_column: "Y"          # Track A update timestamp

# Columns NOT touched by Track A:
#   A  stock name (Japanese)  manual
#   C  my target price        manual (placed next to B current price)
#   F  industry PER           Track B (web research)
#   G  industry PBR           Track B (web research)
#   Z  average target price   Track B (web research, single value)
#   AA theoretical price      Track B (web research, single value)
#   AB unused (reserved)
#   AC unused (reserved)
#   AD Track B fetch date     Track B (web research)
#   AE analysis comment       Track B (Claude's own assessment, deep repeated research)
#   AF memo                   manual
#   AG ticker                 manual (yfinance format)
