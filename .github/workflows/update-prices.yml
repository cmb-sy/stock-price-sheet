name: Update stock prices

on:
  schedule:
    # NOTE: GitHub Actions cron is in UTC and scheduled runs are frequently
    # delayed 10-30+ minutes (sometimes skipped) under load. Treat these as
    # "soon after each market close", not real-time.
    # Twice a day on weekdays:
    #   06:00 UTC = 15:00 JST -> after the TSE (JP) close
    #   22:00 UTC = 07:00 JST -> after the US close (covers EDT/EST; prices are
    #                            the prior session's close)
    - cron: "0 6,22 * * 1-5"
  workflow_dispatch: {}

# Scheduled workflows are auto-disabled after 60 days with no repo commits.
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Update prices
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python update_prices.py
