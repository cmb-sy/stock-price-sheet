# Copy this file to config.yaml and set your spreadsheet_id, then commit
# config.yaml so GitHub Actions can read it. These values are NOT secrets (the
# spreadsheet_id is just the ID from the URL; access is controlled by sharing
# the sheet with the service account). The service-account JSON key is the only
# secret and is passed via the GCP_SA_KEY GitHub Actions secret, never committed.
#
# Do NOT put any ticker symbols in this repo. Tickers go in the Ticker column of
# the private sheet only. See CLAUDE.md.
spreadsheet_id: "PASTE_SPREADSHEET_ID_HERE"  # from docs.google.com/spreadsheets/d/<THIS_PART>/edit
timezone: "Asia/Tokyo"
header_rows: 1

# The holdings tab Track A processes (the literal Japanese tab name in the sheet,
# kept verbatim — the code references it as-is).
holdings_tab: "保有銘柄"

# ---------------------------------------------------------------------------
# Column mapping is by HEADER NAME (row-1 label), not by position. Each value is
# the exact Japanese header label; the code resolves it to a column at runtime,
# so inserting/moving a column does not break the mapping. `ticker` is required;
# any role whose label is absent from the sheet is simply skipped.
#
# Owners: Track A writes current_price / dividend_yield / dividend_amount only.
# The holdings-review Claude skill writes ai_comment only. Everything else is
# human-edited and never overwritten.
# ---------------------------------------------------------------------------
columns:
  ticker: "Ticker"             # manual; rows without a ticker are skipped
  name: "銘柄名"               # manual; never written by either track
  shares: "取得株数"           # manual; multiplied by dividendRate for 配当金
  current_price: "現在株価"    # Track A: yfinance currentPrice
  dividend_yield: "配当利回り" # Track A: yfinance dividendYield (percent number)
  dividend_amount: "配当金"    # Track A: dividendRate * shares (total annual dividend)
  horizon: "短中長期"          # manual; AI-comment input
  target_sell: "目標売却株価"  # manual; AI-comment input
  purchase_reason: "購入理由"  # manual; AI-comment input
  ai_comment: "AIコメント"     # holdings-review skill writes this (only)
