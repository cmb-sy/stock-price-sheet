<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    :root {
      --bg: #f2f4f7; --card: #ffffff; --ink: #111827; --sub: #6b7280;
      --line: #e5e7eb; --accent: #2563eb; --accent-soft: #eff4ff;
      --chip: #f3f4f6;
      --pos: #067647; --neg: #d92d20; --ai-bg: #f5f8ff;
      --navy: #0f172a;
      --shadow: 0 1px 2px rgba(16,24,40,.06), 0 4px 16px rgba(16,24,40,.06);
      --radius: 16px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
        "Yu Gothic", Meiryo, sans-serif;
      background: var(--bg); color: var(--ink);
      font-size: 15px; line-height: 1.5;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ---- header / tabs ---- */
    header {
      position: sticky; top: 0; z-index: 20;
      background: rgba(255,255,255,.86); backdrop-filter: saturate(1.4) blur(12px);
      border-bottom: 1px solid var(--line);
      padding: calc(env(safe-area-inset-top) + 10px) 16px 0;
    }
    h1 { font-size: 17px; font-weight: 700; margin: 0 0 10px; letter-spacing: .01em; }
    .segmented { display: flex; gap: 4px; background: var(--chip);
      padding: 4px; border-radius: 12px; overflow-x: auto; }
    .seg { flex: 1 0 auto; border: 0; background: transparent; color: var(--sub);
      font: inherit; font-weight: 600; font-size: 13px; padding: 8px 12px;
      border-radius: 9px; cursor: pointer; white-space: nowrap; transition: .15s; }
    .seg.active { background: var(--card); color: var(--ink);
      box-shadow: 0 1px 2px rgba(16,24,40,.12); }
    .meta { display: flex; justify-content: space-between; align-items: center;
      padding: 8px 2px 10px; color: var(--sub); font-size: 12px; }
    .sortbox { display: inline-flex; align-items: center; gap: 6px; margin-left: auto; }
    .sort-ico { color: #9ca3af; font-size: 13px; }
    .sortbox select { font: inherit; font-size: 13px; color: #374151;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 4px 8px; max-width: 46vw; }
    .dirbtn { font: inherit; font-size: 14px; line-height: 1; color: #374151;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 5px 9px; cursor: pointer; }
    .dirbtn:active { background: #f3f4f6; }

    /* ---- stock-jump dropdown (header) & detail view ---- */
    .stockbox { display: inline-flex; align-items: center; gap: 6px; }
    .stockbox select { font: inherit; font-size: 13px; color: #374151;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 4px 8px; max-width: 46vw; }
    body:not(.detail) .card { cursor: pointer; }
    body.detail .segmented, body.detail .fab, body.detail .sortbox { display: none; }
    /* 詳細ビューは常に1カラム・読みやすい幅（≥900px のグリッドより優先される）。 */
    body.detail main { display: block; max-width: 760px; }
    .backlink { display: inline-block; margin: 2px 0 10px; font-size: 13px;
      font-weight: 600; color: var(--accent); text-decoration: none; }

    /* ---- list ---- */
    main { padding: 6px 12px 24px; max-width: 720px; margin: 0 auto; }

    /* ---- cards ---- */
    .card {
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 14px 16px; margin: 10px 0; animation: rise .25s ease both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } }
    .card-top { display: flex; align-items: flex-start; gap: 12px; }
    .avatar { flex: 0 0 auto; width: 42px; height: 42px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent-soft); color: var(--accent);
      font-size: 18px; font-weight: 800; }
    .top-mid { flex: 1; min-width: 0; }
    .name-row { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .name { font-size: 16px; font-weight: 700; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pill { flex: 0 0 auto; font-size: 9px; font-weight: 700; border-radius: 4px;
      padding: 1px 5px; background: var(--accent-soft); color: var(--accent); }
    .pill.watch { background: var(--chip); color: var(--sub); }
    .pill.buy { background: #e7f6ef; color: var(--pos); }
    .pill.sell { background: #fdecea; color: var(--neg); }
    .ticker { color: var(--sub); font-size: 11px; font-weight: 600;
      letter-spacing: .02em; margin-top: 2px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; }
    .top-right { flex: 0 0 auto; text-align: right; }
    .price { font-size: 20px; font-weight: 800; letter-spacing: -.01em;
      font-variant-numeric: tabular-nums; white-space: nowrap; }

    /* theme banner */
    .theme { margin: 12px 0 2px; }
    .theme .k { color: var(--sub); font-size: 11px; font-weight: 600;
      display: block; margin-bottom: 2px; }
    .theme .v { font-size: 13px; font-weight: 700; color: #374151; word-break: break-word; }

    /* metrics grid */
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 14px;
      margin: 12px 0 2px; }
    .metric { min-width: 0; }
    .metric .k { color: var(--sub); font-size: 11px; font-weight: 600;
      display: block; margin-bottom: 1px; }
    .metric .v { display: block; font-size: 14px; font-weight: 600;
      font-variant-numeric: tabular-nums;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .metric .v .sub { color: var(--sub); font-weight: 600; font-size: 12px; }
    .metric.ed .k::after { content: " ✎"; color: var(--accent); font-weight: 400; }
    .metric .v.pos { color: var(--pos); }
    .metric .v.neg { color: var(--neg); }
    a.link { color: var(--accent); text-decoration: none; font-weight: 700; }
    a.link::after { content: " ↗"; font-size: 11px; }

    /* notes */
    .notes { border-top: 1px dashed var(--line); margin-top: 12px; padding-top: 12px;
      display: flex; flex-direction: column; gap: 10px; }
    .note .k { font-size: 11px; font-weight: 700; display: inline-block;
      background: var(--accent-soft); color: var(--accent);
      padding: 1px 8px; border-radius: 999px; margin-bottom: 4px; }
    .note.man .k { color: var(--sub); background: var(--chip); }
    .note .body { font-size: 13px; color: #374151; white-space: pre-wrap; word-break: break-word; }
    .note .body.clamp { display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden; }
    .note.ai { background: var(--ai-bg); border: 1px solid #e2e9fb;
      border-radius: 12px; padding: 10px 13px; }
    .note.ai .k { color: #fff; background: var(--accent); }
    .note.ai .k::before { content: "✦ "; }
    .note.ai .body { font-size: 14px; line-height: 1.7; color: #1f2937; margin-top: 2px; }
    .note.ai .body.clamp { -webkit-line-clamp: 6; }
    .more { background: none; border: 0; color: var(--accent); font: inherit;
      font-size: 12px; font-weight: 700; padding: 2px 0; cursor: pointer; }
    .ai-foot { display: flex; justify-content: flex-end; margin-top: 6px; }
    .copy { background: none; border: 0; color: var(--accent); font: inherit;
      font-size: 11px; font-weight: 700; cursor: pointer; padding: 2px 0; }
    .copy::before { content: "⧉ "; }

    /* card foot */
    .card-foot { display: flex; align-items: center; justify-content: space-between;
      margin-top: 12px; }
    .stamp { color: #9ca3af; font-size: 11px; font-variant-numeric: tabular-nums; }
    .edit-btn { border: 1px solid var(--line); background: var(--card); color: var(--ink);
      font: inherit; font-weight: 700; font-size: 13px; padding: 8px 16px;
      border-radius: 10px; cursor: pointer; transition: .15s; }
    .edit-btn::before { content: "✎ "; }
    .edit-btn:active { transform: scale(.97); }

    /* ---- glossary ---- */
    .gloss-search { display: flex; align-items: center; gap: 8px; background: var(--card);
      border: 1px solid var(--line); border-radius: 12px; padding: 8px 12px;
      margin: 8px 0 12px; box-shadow: var(--shadow); }
    .gloss-search .ico { color: var(--sub); font-size: 14px; }
    .gloss-search input { flex: 1; border: 0; outline: none; font: inherit; font-size: 14px;
      background: transparent; color: var(--ink); }
    .gloss-intro { color: var(--sub); font-size: 12.5px; padding: 0 2px 12px; line-height: 1.6; }
    .gloss-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .gloss-chip { background: var(--card); border: 1px solid var(--line);
      color: #374151; font-size: 12px; font-weight: 600;
      border-radius: 999px; padding: 6px 12px; }
    .gloss-sec { margin: 0 0 18px; }
    .gloss-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .gloss-head h3 { font-size: 13px; font-weight: 800; margin: 0; color: var(--accent); letter-spacing: .02em; }
    .gloss-head .cnt { color: var(--sub); font-size: 11px; }
    .gloss-card { background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 6px 16px; }
    .term { padding: 11px 0; border-bottom: 1px solid var(--line); }
    .term:last-child { border-bottom: 0; }
    .term .t { font-size: 14px; font-weight: 700; }
    .term .d { font-size: 13px; color: #4b5563; line-height: 1.6; margin-top: 3px; }
    .formula { display: flex; align-items: center; flex-wrap: wrap; gap: 7px;
      font-size: 13px; color: #374151; margin: 5px 0 4px; font-variant-numeric: tabular-nums; }
    .formula .op { color: #6b7280; white-space: nowrap; }
    .frac { display: inline-flex; flex-direction: column; text-align: center; vertical-align: middle; }
    .frac .num { padding: 0 8px 2px; border-bottom: 1.6px solid #9ca3af; }
    .frac .den { padding: 2px 8px 0; }

    /* ---- skeleton / empty ---- */
    .skel { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 16px; margin: 10px 0; }
    .sk { background: linear-gradient(90deg, #eee 25%, #f5f5f5 37%, #eee 63%);
      background-size: 400% 100%; animation: sh 1.2s infinite; border-radius: 6px; }
    @keyframes sh { from { background-position: 100% 0; } to { background-position: 0 0; } }
    .empty { text-align: center; color: var(--sub); padding: 48px 16px; }
    .empty .ico { font-size: 32px; }

    /* ---- bottom sheet editor ---- */
    .scrim { position: fixed; inset: 0; background: rgba(17,24,39,.45);
      opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 30; }
    .scrim.open { opacity: 1; pointer-events: auto; }
    .sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 31;
      background: var(--card); border-radius: 20px 20px 0 0;
      max-width: 720px; margin: 0 auto; max-height: 92vh; overflow-y: auto;
      transform: translateY(100%); transition: transform .26s cubic-bezier(.32,.72,0,1);
      padding: 8px 18px calc(16px + env(safe-area-inset-bottom));
      box-shadow: 0 -8px 40px rgba(16,24,40,.2); }
    .sheet.open { transform: translateY(0); }
    .handle { width: 40px; height: 4px; background: #d1d5db; border-radius: 999px;
      margin: 8px auto 6px; }
    .mode-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
    .eyebrow { color: var(--accent); font-size: 10px; font-weight: 700; letter-spacing: .04em; }
    .close-btn { width: 26px; height: 26px; border-radius: 999px; border: 0;
      background: var(--chip); color: var(--sub); font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; }
    .sheet h2 { font-size: 16px; margin: 6px 0 14px; font-weight: 700; }
    .sheet h2 small { color: var(--sub); font-weight: 600; font-size: 12px; }
    .sec-head { color: var(--accent); font-size: 11px; font-weight: 800;
      letter-spacing: .02em; margin-bottom: 10px; }
    .progress { display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; }
    .progress .txt { color: var(--sub); font-size: 11px; }
    .dots { display: flex; gap: 4px; }
    .dot { width: 28px; height: 5px; border-radius: 999px; background: var(--line); transition: .2s; }
    .dot.on { background: var(--accent); }
    .fld { margin-bottom: 14px; }
    .fld label { display: block; font-weight: 700; font-size: 13px; }
    .fld label .req { color: var(--neg); }
    .fld .help { color: #9ca3af; font-size: 11px; margin: 2px 0 6px; }
    .fld input, .fld textarea, .fld select { width: 100%; padding: 11px 12px;
      border: 1px solid var(--line); border-radius: 12px; font: inherit; font-size: 15px;
      background: #fafafa; transition: .15s; }
    .fld input:focus, .fld textarea:focus, .fld select:focus { outline: none; border-color: var(--accent);
      background: #fff; box-shadow: 0 0 0 3px var(--accent-soft); }
    .fld textarea { min-height: 92px; resize: vertical; line-height: 1.55; }
    .ro { background: var(--chip); border-radius: 12px; padding: 12px; margin: 6px 0 16px; }
    .ro .h { display: flex; align-items: center; gap: 6px; font-size: 11px;
      font-weight: 700; color: var(--sub); margin-bottom: 4px; }
    .ro .h::before { content: "🔒"; font-size: 11px; }
    .ro .note-line { color: #9ca3af; font-size: 11px; margin-bottom: 8px; line-height: 1.5; }
    .ro .row { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; font-size: 13px; }
    .ro .row .rk { color: var(--sub); }
    .ro .row .rv { font-weight: 600; text-align: right; word-break: break-word; }
    .actions { position: sticky; bottom: 0; background: var(--card);
      display: flex; gap: 10px; padding: 12px 0 4px; }
    .danger { margin-top: 4px; }
    .danger-div { height: 1px; background: #f0f0f0; margin: 4px 0 12px; }
    .btn.del { width: 100%; color: var(--neg); border: 1px solid #f3c0c0;
      background: #fff; }
    .btn.del:active { background: #fff5f5; }
    .btn.del.confirm { color: #fff; background: var(--neg); border-color: var(--neg); }
    .btn.del:disabled { opacity: .6; }
    .btn { flex: 1; padding: 13px; border-radius: 12px; font: inherit; font-weight: 700;
      font-size: 15px; cursor: pointer; border: 1px solid var(--line); background: #fff; }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.primary::before { content: "✓ "; }
    .btn.primary .kbd { font-size: 10px; font-weight: 500; opacity: .8; margin-left: 6px; }
    .btn:active { transform: scale(.98); }
    .btn[disabled] { opacity: .55; cursor: default; transform: none; }

    /* ---- add-stock FAB ---- */
    .fab { position: fixed; right: 16px; z-index: 25; display: none;
      bottom: calc(20px + env(safe-area-inset-bottom)); align-items: center; gap: 2px;
      background: var(--accent); color: #fff; border: 0; border-radius: 999px;
      padding: 14px 20px; font: inherit; font-weight: 700; font-size: 14px;
      box-shadow: 0 6px 20px rgba(37,99,235,.4); cursor: pointer; transition: .15s; }
    .fab.show { display: inline-flex; }
    .fab:active { transform: scale(.97); }
    .fab .plus { font-size: 18px; line-height: 1; margin-right: 2px; }

    .toast { position: fixed; left: 50%; bottom: 24px; transform: translate(-50%, 20px);
      background: var(--navy); color: #fff; padding: 10px 18px; border-radius: 999px;
      font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none;
      transition: .25s; z-index: 40; }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .toast::before { content: "✓ "; color: #34d399; }

    /* ---- responsive grid (PC/tablet) ----
       Below 900px keep the single-column mobile layout. From 900px up, lay the
       cards out as a multi-column grid driven by `auto-fill, minmax(340px, 1fr)`
       (so cards stay readable; 2 columns at ~900px, 3 around 1280px). The
       glossary chrome spans the full row. Cards in the same row stretch to
       equal height (default grid align-items: stretch); each card is a flex
       column with the foot pinned to the bottom so 更新/編集 lines up across
       the row regardless of content height. */
    @media (min-width: 900px) {
      main { max-width: 1280px;
        display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 16px; }
      .empty, .gloss-search, .gloss-intro, .gloss-chips,
      #glossBody { grid-column: 1 / -1; }
      .card, .skel { margin: 0; }
      .card { display: flex; flex-direction: column; }
      .card .card-foot { margin-top: auto; padding-top: 12px; }
    }
    @media (min-width: 1400px) { main { max-width: 1480px; } }
  </style>
</head>

<script>

  var INIT = <?!= initJson ?>;
  var ROLE = { name: '銘柄名', price: '現在株価', ticker: 'Ticker', updated: '更新時刻',
    theme: '業界やテーマ' };
  // Holdings cost-basis roles, used to derive 評価額 / 評価損益 client-side.
  var DERIVE = { acquire: '取得株価', shares: '取得株数', targetSell: '目標売却株価',
    myTarget: '購入検討株価', analyst: 'アナリスト予想株価' };
  // Combined metric chips: a value column paired with its industry-average column.
  var PAIRS = [
    { label: 'PER（業界）', own: 'PER', sub: '業界PER' },
    { label: 'PBR（業界）', own: 'PBR', sub: '業界PBR' }
  ];
  // Labels that must NOT render as standalone chips (shown elsewhere / combined).
  var SUPPRESS = { '業界PER': 1, '業界PBR': 1, '業界やテーマ': 1, 'PER': 1, 'PBR': 1 };
  // Metrics colored by sign (positive = green, negative = red).
  var SIGNED = { '年間EPS前年比（%）': 1, '年初来安値との乖離率': 1 };
  // Full-width note blocks, shown in this order.
  var NOTES = [
    { label: '購入検討理由', man: true },
    { label: '購入理由',     man: true },
    { label: '理由',         man: true },
    { label: 'AIコメント',   man: false, ai: true },
    { label: 'AI分析コメント', man: false, ai: true }
  ];
  var LONG_EDIT = ['購入検討理由', '購入理由', '理由'];
  // Short helper text under editable field labels (no schema dependency).
  var HELP = {
    '銘柄名': '正式名称', 'Ticker': 'yfinance 形式（例 7203.T, AAPL）',
    '購入検討株価': '狙う購入価格', '購入検討理由': '検討の根拠をメモ',
    '目標売却株価': '売却の目標価格', '取得株価': '購入時の株価', '取得株数': '保有株数',
    '株主優待': '優待の内容',
    '購入理由': '購入の根拠をメモ',
    'ナンピン検討株価': '買い増しを検討する株価', 'ナンピン検討株数': '買い増しを検討する株数',
    '日付': '取引日（例 2026-06-08）', '売買区分': '買い / 売り',
    '約定単価': '約定した1株の価格', '株数': '約定した株数',
    '理由': '売買の根拠をメモ（AI 分析の材料）'
  };

  // ---- trade-history (売買履歴) tab ----
  // 保有でも監視でもない第3のタブ種別 = 取引台帳。以降の分岐は isHistoryTab() で切替。
  var HISTORY_TAB = '売買履歴';
  var BUY_SELL = '売買区分';
  function isHistoryTab() { return state.tab === HISTORY_TAB; }
  // 列挙型 editable フィールドの <select> 選択肢（label -> options）。

        [{ n: '現在値 − 年初来安値', d: '年初来安値' }, '× 100']],

    ]},
    { sec: '目標株価との距離（出口とエントリーの判断）', items: [

      ['理論株価',
        '利益・資産・成長率などから算定した妥当株価。市場価格との乖離が投資妙味だが、算定前提に強く依存する。'],
      ['予想乖離率',
        'アナリスト予想株価と現在株価の差。プラスが大きいほど上値余地が大きい＝割安と見なせる。',
        [{ n: 'アナリスト予想株価 − 現在株価', d: '現在株価' }, '× 100']],
      ['目標との乖離率',

        [{ n: '現在株価 − 目標売却株価', d: '目標売却株価' }, '× 100']],
      ['購入検討との乖離率',
        '現在株価と自分の購入検討株価の差。マイナスは狙い値より安い＝買い場が近いことを示す（監視銘柄）。',
        [{ n: '現在株価 − 購入検討株価', d: '購入検討株価' }, '× 100']]

  var state = { tab: null, headers: [], rows: [], view: [], editing: null,
    original: {}, holdingsTab: null, required: [], noteText: {},
    sortKey: null, sortDir: 'desc', detailRow: 0 };

  function $(id) { return document.getElementById(id); }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }
  function isUrl(v) { return /^https?:\/\//i.test(String(v || '').trim()); }
  function noteOf(label) {
    for (var i = 0; i < NOTES.length; i++) if (NOTES[i].label === label) return NOTES[i];
    return null;
  }
  function toast(msg) {
    var t = $('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toast._t); toast._t = setTimeout(function () { t.classList.remove('show'); }, 1800);
  }

  // parseNum（表示文字列 -> number）は sortlib.html に移動（単一ソース・Node テスト対象）。
  function yen(n) { return '¥' + Math.round(n).toLocaleString('ja-JP'); }
  function yenSigned(n) {
    return (n >= 0 ? '+' : '−') + '¥' + Math.abs(Math.round(n)).toLocaleString('ja-JP');
  }
  function pctSigned(n) { return (n >= 0 ? '+' : '') + n.toFixed(1) + '%'; }
  function signCls(n) { return n > 0 ? 'pos' : (n < 0 ? 'neg' : ''); }

  function firstChar(s) { s = String(s || '').trim(); return s ? Array.from(s)[0] : '?'; }

  function copyText(t) {
    try {
      var ta = document.createElement('textarea');
      ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      var ok = document.execCommand('copy');
      document.body.removeChild(ta);
      toast(ok ? 'コピーしました' : 'コピーできませんでした');
    } catch (e) { toast('コピーできませんでした'); }
  }

  function init() {
    google.script.run.withSuccessHandler(function (tabs) {
      var box = $('tabs');
      state.holdingsTab = tabs.length ? tabs[0] : null;
      tabs.forEach(function (t, i) {
        var b = document.createElement('button');
        b.className = 'seg' + (i === 0 ? ' active' : '');
        b.textContent = t;
        b.onclick = function () { selectTab(t, b); };
        box.appendChild(b);
      });
      var g = document.createElement('button');
      g.className = 'seg';
      g.textContent = GLOSSARY_TAB;
      g.onclick = function () { selectTab(GLOSSARY_TAB, g); };
      box.appendChild(g);
      // ?view=detail&tab=…&row=… で開かれたら単一銘柄の詳細ビューで起動する。
      if (INIT.view === 'detail' && INIT.row > 0 && tabs.indexOf(INIT.tab) >= 0) {
        state.detailRow = INIT.row;
        document.body.classList.add('detail');
        selectTab(INIT.tab, box.children[tabs.indexOf(INIT.tab)]);
        return;
      }
      if (tabs.length) selectTab(tabs[0], box.firstChild);
    }).withFailureHandler(fail).getTabs();
  }

  // ---- detail view (opens in a new browser tab) & stock-jump dropdown ----
  function detailUrl(row) {
    return (INIT.execUrl || '') + '?view=detail&tab=' +
      encodeURIComponent(state.tab) + '&row=' + row;
  }
  function openDetail(row) { window.open(detailUrl(row), '_blank'); }
  function buildStockUI() {
    var box = $('stockbox'), sel = $('stockSel');
    // 売買履歴は同一銘柄が複数行になるため銘柄ジャンプは出さない。
    if (isHistoryTab() || !state.rows.length) { box.style.display = 'none'; return; }
    var H = state.headers;
    var opts = '<option value="">銘柄を選択…</option>';
    state.rows.slice().sort(function (a, b) {
      var an = nameOfRow(H, a), bn = nameOfRow(H, b);
      return an.localeCompare(bn, 'ja');
    }).forEach(function (r) {
      opts += '<option value="' + r.row + '">' + esc(nameOfRow(H, r)) + '</option>';
    });
    sel.innerHTML = opts;
    sel.onchange = function () {
      var row = parseInt(sel.value, 10);
      if (!row) return;
      sel.value = '';
      // 一覧からは新規タブで開く。詳細ページ内では同じタブで銘柄を切り替える。
      if (state.detailRow) { window.open(detailUrl(row), '_top'); }
      else { openDetail(row); }
    };
    box.style.display = '';
  }
  function nameOfRow(headers, r) {
    var nameIdx = -1, tickerIdx = -1;
    headers.forEach(function (h, i) {
      if (h.label === ROLE.name) nameIdx = i;
      if (h.label === ROLE.ticker) tickerIdx = i;
    });
    var n = nameIdx >= 0 ? String(r.cells[nameIdx] || '').trim() : '';
    var t = tickerIdx >= 0 ? String(r.cells[tickerIdx] || '').trim() : '';
    return n || t || '(名称未設定)';
  }

  function selectTab(tab, btn) {
    if (state.tab === tab) return;
    state.tab = tab;
    state.sortKey = null; state.sortDir = 'desc';
    $('sortbox').style.display = 'none';  // hide synchronously; buildSortUI() re-shows on data load
    $('stockbox').style.display = 'none'; // ditto; buildStockUI() re-shows on data load
    [].forEach.call(document.querySelectorAll('.seg'), function (e) { e.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    $('addFab').classList.remove('show');
    if (tab === GLOSSARY_TAB) { renderGlossary(); return; }
    load();
  }

  function renderGlossary() {
    $('count').textContent = '用語解説'; $('hint').textContent = '';
    var out = '<div class="gloss-search"><span class="ico">⌕</span>' +
      '<input id="glossQ" type="text" placeholder="用語を検索（例: PEG、業界PER）" ' +
      'autocomplete="off" aria-label="用語を検索"></div>';
    out += '<div class="gloss-intro">投資判断に使う指標の意味と読み方のメモです。' +
      '割安度・収益性・需給・目標株価の観点で整理しています。</div>';
    out += '<div class="gloss-chips">';
    GLOSSARY.forEach(function (g) {
      var label = g.sec.replace(/（.*$/, '') + ' ' + g.items.length;
      out += '<span class="gloss-chip">' + esc(label) + '</span>';
    });
    out += '</div><div id="glossBody"></div>';
    $('list').innerHTML = out;
    var q = $('glossQ');
    q.addEventListener('input', function () { renderGlossBody(q.value); });
    renderGlossBody('');
  }

  function renderGlossBody(query) {
    var q = String(query || '').trim().toLowerCase();
    var out = '';
    GLOSSARY.forEach(function (g) {
      var items = g.items.filter(function (it) {
        if (!q) return true;
        return (it[0] + ' ' + it[1]).toLowerCase().indexOf(q) >= 0;
      });
      if (!items.length) return;
      out += '<div class="gloss-sec"><div class="gloss-head">' +
        '<h3>' + esc(g.sec) + '</h3>' +
        '<span class="cnt">' + items.length + ' 項目</span></div>' +
        '<div class="gloss-card">';
      items.forEach(function (it) {
        var f = it[2] ? formulaHtml(it[2]) : '';
        out += '<div class="term"><div class="t">' + esc(it[0]) + '</div>' +
          f + '<div class="d">' + esc(it[1]) + '</div></div>';
      });
      out += '</div></div>';
    });
    if (!out) out = '<div class="empty"><div class="ico">🔍</div><div>該当する用語がありません</div></div>';
    $('glossBody').innerHTML = out;
  }

  function formulaHtml(tokens) {
    var h = '<div class="formula">';
    tokens.forEach(function (tk) {
      if (typeof tk === 'string') {
        h += '<span class="op">' + esc(tk) + '</span>';
      } else {
        h += '<span class="frac"><span class="num">' + esc(tk.n) +
          '</span><span class="den">' + esc(tk.d) + '</span></span>';
      }
    });
    return h + '</div>';
  }

  function skeleton() {
    var h = '';
    for (var i = 0; i < 4; i++) {
      h += '<div class="skel">' +
        '<div class="sk" style="height:18px;width:55%"></div>' +
        '<div class="sk" style="height:12px;width:30%;margin-top:8px"></div>' +
        '<div class="sk" style="height:48px;width:100%;margin-top:14px"></div></div>';
    }
    $('list').innerHTML = h;
  }

  function load() {
    skeleton();
    $('count').textContent = ''; $('hint').textContent = '';
    // seq はタブ切替/再読込と非同期応答の競合ガード。古い応答は黙って捨てる。
    state.loadSeq = (state.loadSeq || 0) + 1;
    var seq = state.loadSeq;
    state.recon = null;
    google.script.run.withSuccessHandler(function (data) {
      if (seq !== state.loadSeq) return;
      state.headers = data.headers; state.rows = data.rows;
      state.loadedSeq = seq;
      // シート順（未ソート）選択肢を廃止したため、各タブは必ず既定キーで整列させる。
      // 売買履歴は日付降順（新しい取引が上）、保有/監視は銘柄名昇順（中立で決定的）。
      // selectTab が sortKey=null にリセットするので、タブ切替ごとにこの既定が適用される。
      // ユーザーが他キーを選んだ後の再読込（load 再実行）ではその選択を尊重する。
      if (!state.sortKey) {
        var ds = isHistoryTab() ? { key: '日付', dir: 'desc' } : { key: ROLE.name, dir: 'asc' };
        state.sortKey = ds.key; state.sortDir = ds.dir;
      }
      buildSortUI();
      buildStockUI();
      render();
      $('count').textContent = state.detailRow ? '詳細表示' : data.rows.length + ' 銘柄';
      $('hint').textContent = '✎ は編集できる項目';
      $('addFab').classList.toggle('show',
        !state.detailRow && state.tab !== state.holdingsTab);
    }).withFailureHandler(fail).getRows(state.tab);

    // 台帳照合: 保有タブのときだけ売買履歴を並列取得し、届き次第チップを再描画する
    // （2段描画）。取得失敗は照合なしで degrade（toast なし）。本体データが未着なら
    // state.recon を置くだけにして、本体側の render が拾う。
    if (state.tab === state.holdingsTab) {
      google.script.run.withSuccessHandler(function (h) {
        if (seq !== state.loadSeq) return;
        state.recon = ledgerPositions(h.headers, h.rows);
        if (state.loadedSeq === seq) render();
      }).withFailureHandler(function () {}).getRows(HISTORY_TAB);
    }
  }

  function valueHtml(val) {
    if (isUrl(val)) {
      var label = /kabutan/i.test(val) ? 'かぶたん' : /minkabu/i.test(val) ? 'みんかぶ' : 'リンク';
      return '<a class="link" target="_blank" rel="noopener" href="' + esc(val) + '">' + label + '</a>';
    }
    return esc(val);
  }

  // {label: {val, ed}} for a row's cells, keyed by header label.
  function byLabelOf(headers, cells) {
    var byLabel = {};
    headers.forEach(function (h, ci) { byLabel[h.label] = { val: cells[ci], ed: h.editable }; });
    return byLabel;
  }

  function fieldHtml(label, val, required) {
    var help = HELP[label] ? '<div class="help">' + esc(HELP[label]) + '</div>' : '';
    var req = required ? ' <span class="req">*</span>' : '';
    var lab = '<label>✎ ' + esc(label) + req + '</label>' + help;
    if (SELECT_OPTS[label]) {
      var cur = String(val == null ? '' : val).trim();
      var opts = '<option value=""></option>' + SELECT_OPTS[label].map(function (o) {
        return '<option value="' + esc(o) + '"' + (o === cur ? ' selected' : '') +
          '>' + esc(o) + '</option>';
      }).join('');
      return lab + '<select data-h="' + esc(label) + '">' + opts + '</select>';
    }
    var isLong = LONG_EDIT.indexOf(label) >= 0;
    return lab + (isLong
      ? '<textarea data-h="' + esc(label) + '">' + esc(val) + '</textarea>'
      : '<input data-h="' + esc(label) + '" value="' + esc(val) + '">');
  }

  function errMsg(e) { return e && e.message ? e.message : e; }

  function runSave(busyMsg, okMsg, errPrefix, invoke) {
    var btn = $('saveBtn'); btn.disabled = true; btn.textContent = busyMsg;
    var runner = google.script.run.withSuccessHandler(function () {
      btn.disabled = false; btn.innerHTML = '保存<span class="kbd">⌘⏎</span>';
      closeSheet(); toast(okMsg); load();
    }).withFailureHandler(function (e) {
      btn.disabled = false; btn.innerHTML = '保存<span class="kbd">⌘⏎</span>';
      toast(errPrefix + errMsg(e));
    });
    invoke(runner);
  }

  // Derived metric chips computed client-side from real columns. Returns
  // [{ k, html, cls }]. Holdings derive 評価額/評価損益; watchlist derive 乖離率.
  function derivedMetrics(byLabel, isHoldings) {
    function num(label) { return byLabel[label] ? parseNum(byLabel[label].val) : null; }
    var out = [];
    var cur = num(ROLE.price);
    if (isHoldings) {
      var acq = num(DERIVE.acquire), sh = num(DERIVE.shares), tgt = num(DERIVE.targetSell);
      if (cur != null && sh != null) out.push({ k: '評価額', html: esc(yen(cur * sh)) });
      if (cur != null && acq != null && sh != null) {
        var pl = (cur - acq) * sh, plr = (cur - acq) / acq * 100;
        out.push({ k: '評価損益額', html: esc(yenSigned(pl)), cls: signCls(pl) });
        out.push({ k: '評価損益率', html: esc(pctSigned(plr)), cls: signCls(plr) });
      }
      if (cur != null && tgt != null) {
        var td = (cur - tgt) / tgt * 100;
        out.push({ k: '目標との乖離率', html: esc(pctSigned(td)), cls: signCls(td) });
      }
    } else {
      var my = num(DERIVE.myTarget), an = num(DERIVE.analyst);
      if (cur != null && my != null) {
        var md = (cur - my) / my * 100;
        out.push({ k: '購入検討との乖離率', html: esc(pctSigned(md)), cls: signCls(md) });
      }
      if (cur != null && an != null) {
        var ad = (an - cur) / cur * 100;
        out.push({ k: '予想乖離率', html: esc(pctSigned(ad)), cls: signCls(ad) });
      }
    }
    return out;
  }

  // 台帳照合チップ。売買履歴から導出したポジション（state.recon）と保有カードの
  // 手入力値（取得株数/取得株価）を照合する。表示のみで自動反映はしない（設計制約）。
  // 台帳に該当 Ticker がないなら表示しない。台帳がネット0株（クリーン全売却）でも
  // 保有側に株数が残っていれば記入漏れの可能性があるため不一致として表示する。
  function reconMetric(byLabel) {
    var raw = byLabel[ROLE.ticker] ? byLabel[ROLE.ticker].val : '';
    var t = String(raw == null ? '' : raw).trim().toUpperCase();
    if (!t || !state.recon[t]) return null;
    var pos = state.recon[t];
    var heldSh = byLabel[DERIVE.shares] ? parseNum(byLabel[DERIVE.shares].val) : null;
    var heldAvg = byLabel[DERIVE.acquire] ? parseNum(byLabel[DERIVE.acquire].val) : null;
    if (!pos.oversold && pos.invalid === 0 && pos.shares === 0 && !heldSh) return null;
    var st = reconcileHolding(pos, heldSh, heldAvg);
    if (st === 'match') return { k: '台帳照合', html: '✓ 一致', cls: 'pos' };
    if (st === 'warn') {
      return { k: '台帳照合', html: esc('⚠ ' + (pos.oversold ? '売り超過' : '解析不能行あり')), cls: 'neg' };
    }
    var detail = pos.shares + '株' + (pos.avgPrice !== null ? ' / ' + yen(pos.avgPrice) : '');
    return { k: '台帳照合', html: esc('台帳: ' + detail), cls: 'neg' };
  }

  // Standalone (non-paired, non-note, non-role) column chips. Returns [{k,html,cls,ed}].
  function columnMetrics(H, byLabel) {
    var out = [];
    PAIRS.forEach(function (p) {
      var own = byLabel[p.own], sub = byLabel[p.sub];
      var ov = own && own.val != null ? String(own.val).trim() : '';
      var sv = sub && sub.val != null ? String(sub.val).trim() : '';
      if (!ov && !sv) return;
      var k = sv ? p.label : p.own;
      var html = esc(ov || '—') + (sv ? ' <span class="sub">(' + esc(sv) + ')</span>' : '');
      out.push({ k: k, html: html, ed: own && own.ed });
    });
    H.forEach(function (h) {
      var label = h.label, cell = byLabel[label];
      if (!cell) return;
      if (label === ROLE.name || label === ROLE.price || label === ROLE.ticker ||
          label === ROLE.updated) return;
      if (SUPPRESS[label] || noteOf(label)) return;
      if (isHistoryTab() && label === BUY_SELL) return; // バッジで表示するのでチップ重複を抑止
      var v = String(cell.val == null ? '' : cell.val).trim();
      if (!v) return;
      var cls = '';
      if (SIGNED[label]) cls = signCls(parseNum(v) || 0);
      out.push({ k: label, html: valueHtml(cell.val), cls: cls, ed: cell.ed });
    });
    return out;
  }

  function metricCellHtml(m) {
    return '<div class="metric' + (m.ed ? ' ed' : '') + '">' +
      '<span class="k">' + esc(m.k) + '</span>' +
      '<span class="v ' + (m.cls || '') + '">' + m.html + '</span></div>';
  }

  // Curated sortable columns. A header-based option appears only if its label is
  // present in the current tab's headers; derived options appear per tab type. Order
  // here is the menu order.
  var SORT_NUM = ['現在株価', '年初来安値との乖離率', 'PER', 'PBR', '配当利回り',
    '時価総額', '現在EPS', '年間EPS前年比（%）', 'アナリスト予想株価', '理論株価'];
  var HOLDINGS_DERIVED = ['評価額', '評価損益額', '評価損益率', '目標との乖離率'];
  var WATCH_DERIVED = ['購入検討との乖離率', '予想乖離率'];

  function sortOptions() {
    var present = {};
    state.headers.forEach(function (h) { present[h.label] = 1; });
    var opts = [];
    if (isHistoryTab()) {
      ['日付', '約定単価', '株数', ROLE.name].forEach(function (l) {
        if (present[l]) opts.push({ key: l, label: l });
      });
      return opts;
    }
    if (present[ROLE.name]) opts.push({ key: ROLE.name, label: ROLE.name });
    SORT_NUM.forEach(function (l) { if (present[l]) opts.push({ key: l, label: l }); });
    if (present['レーティング']) opts.push({ key: 'レーティング', label: 'レーティング' });
    var isH = state.tab === state.holdingsTab;
    (isH ? HOLDINGS_DERIVED : WATCH_DERIVED).forEach(function (l) {
      opts.push({ key: l, label: l });
    });
    if (present[ROLE.updated]) opts.push({ key: ROLE.updated, label: ROLE.updated });
    return opts;
  }

  // Sortable value for one row under `key`: number | string | null. null sinks (see
  // compareKeys). Mirrors derivedMetrics formulas; division guards drop 0 denominators.
  function sortValue(row, key) {
    var byLabel = byLabelOf(state.headers, row.cells);
    function num(l) { return byLabel[l] ? parseNum(byLabel[l].val) : null; }
    var cur = num(ROLE.price);
    switch (key) {
      case '評価額': { var s = num(DERIVE.shares);
        return (cur != null && s != null) ? cur * s : null; }
      case '評価損益額': { var a = num(DERIVE.acquire), s2 = num(DERIVE.shares);
        return (cur != null && a != null && s2 != null) ? (cur - a) * s2 : null; }
      case '評価損益率': { var a2 = num(DERIVE.acquire);
        return (cur != null && a2) ? (cur - a2) / a2 * 100 : null; }
      case '目標との乖離率': { var t = num(DERIVE.targetSell);
        return (cur != null && t) ? (cur - t) / t * 100 : null; }
      case '購入検討との乖離率': { var my = num(DERIVE.myTarget);
        return (cur != null && my) ? (cur - my) / my * 100 : null; }
      case '予想乖離率': { var an = num(DERIVE.analyst);
        return (cur != null && an != null && cur) ? (an - cur) / cur * 100 : null; }
      case ROLE.name: { var nm = byLabel[ROLE.name] ?
        String(byLabel[ROLE.name].val == null ? '' : byLabel[ROLE.name].val).trim() : '';
        return nm || null; }
      case 'レーティング': return byLabel['レーティング'] ?
        ratingRank(byLabel['レーティング'].val) : null;
      case ROLE.updated: { var raw = byLabel[ROLE.updated] ?
        String(byLabel[ROLE.updated].val || '') : '';
        var d = Date.parse(raw.replace(/\//g, '-')); return isNaN(d) ? null : d; }
      case '日付': { var draw = byLabel['日付'] ?
        String(byLabel['日付'].val || '') : '';
        var dd = Date.parse(draw.replace(/\//g, '-')); return isNaN(dd) ? null : dd; }
      default: return num(key);
    }
  }

  function applySort() {
    state.view = state.sortKey
      ? sortRows(state.rows, function (r) { return sortValue(r, state.sortKey); },
          state.sortDir)
      : state.rows.slice();
  }

  function dirGlyph() { return state.sortDir === 'asc' ? '↑' : '↓'; }

  function buildSortUI() {
    if (state.detailRow) { $('sortbox').style.display = 'none'; return; }
    var sel = $('sortSel');
    sel.innerHTML = sortOptions().map(function (o) {
      return '<option value="' + esc(o.key) + '">' + esc(o.label) + '</option>';
    }).join('');
    sel.value = state.sortKey || '';
    $('sortDir').textContent = dirGlyph();
    $('sortbox').style.display = '';
  }

  function render() {
    var H = state.headers;
    state.noteText = {};
    if (!state.rows.length) {
      $('list').innerHTML = '<div class="empty"><div class="ico">🗂️</div>' +
        '<div>表示できる銘柄がありません</div></div>';
      return;
    }
    applySort();
    var detail = state.detailRow;
    if (detail) {
      // 詳細ビュー: URL の row に一致する1行だけを表示。行が見つからない場合
      // （削除・行ズレ）はフォールバックして一覧へ誘導する。
      state.view = state.view.filter(function (r) { return r.row === detail; });
      if (!state.view.length) {
        $('list').innerHTML = '<div class="empty"><div class="ico">🔍</div>' +
          '<div>銘柄が見つかりません（削除または行の移動）</div>' +
          '<div style="margin-top:10px"><a class="backlink" href="' +
          esc(INIT.execUrl || '?') + '" target="_top">← 一覧へ戻る</a></div></div>';
        return;
      }
    }
    var isHoldings = state.tab === state.holdingsTab;
    var out = '';
    if (detail) {
      out += '<div><a class="backlink" href="' + esc(INIT.execUrl || '?') +
        '" target="_top">← 一覧へ戻る</a></div>';
    }

    state.view.forEach(function (row, idx) {
      var byLabel = byLabelOf(H, row.cells);
      var name = byLabel[ROLE.name] ? byLabel[ROLE.name].val : '';
      var ticker = byLabel[ROLE.ticker] ? byLabel[ROLE.ticker].val : '';
      var price = byLabel[ROLE.price] ? byLabel[ROLE.price].val : '';
      var stamp = byLabel[ROLE.updated] ? byLabel[ROLE.updated].val : '';

      var ch = firstChar(name || ticker || '?');
      // ピル: 保有/監視は種別ラベル、売買履歴は売買区分（買い=緑 / 売り=赤）。
      var pillCls, pillTxt;
      if (isHistoryTab()) {
        var bs = byLabel[BUY_SELL] ?
          String(byLabel[BUY_SELL].val == null ? '' : byLabel[BUY_SELL].val).trim() : '';
        pillTxt = bs || '—';
        pillCls = bs === '売り' ? ' sell' : ' buy';
      } else {
        pillTxt = isHoldings ? '保有' : '監視';
        pillCls = isHoldings ? '' : ' watch';
      }
      var c = '<div class="card" data-row="' + row.row + '"><div class="card-top">';
      c += '<div class="avatar">' + esc(ch) + '</div>';
      c += '<div class="top-mid"><div class="name-row">' +
        '<span class="name">' + esc(name || '(名称未設定)') + '</span>' +
        '<span class="pill' + pillCls + '">' + esc(pillTxt) + '</span></div>';
      if (ticker) c += '<div class="ticker">' + esc(ticker) + '</div>';
      c += '</div>';
      c += '<div class="top-right">';
      if (String(price).trim()) c += '<div class="price">' + esc(price) + '</div>';
      c += '</div></div>';

      var theme = byLabel[ROLE.theme];
      if (theme && String(theme.val == null ? '' : theme.val).trim()) {
        c += '<div class="theme"><span class="k">' + esc(ROLE.theme) + '</span>' +
          '<div class="v">' + esc(theme.val) + '</div></div>';
      }

      var metrics = columnMetrics(H, byLabel).concat(derivedMetrics(byLabel, isHoldings));
      if (isHoldings && state.recon) {
        var rm = reconMetric(byLabel);
        if (rm) metrics.push(rm);
      }
      if (metrics.length) {
        c += '<div class="grid">';
        metrics.forEach(function (m) { c += metricCellHtml(m); });
        c += '</div>';
      }

      var notesHtml = '';
      NOTES.forEach(function (n) {
        var cell = byLabel[n.label];
        if (!cell) return;
        var v = String(cell.val == null ? '' : cell.val);
        if (!v.trim()) return;
        var nid = 'n' + idx + '_' + n.label.replace(/[^\w]/g, '');
        state.noteText[nid] = v;
        // 詳細ビューでは折りたたまず全文を表示する。
        var longish = !detail && v.length > (n.ai ? 200 : 90);
        var cls = 'note' + (n.man ? ' man' : '') + (n.ai ? ' ai' : '');
        notesHtml += '<div class="' + cls + '">' +
          '<span class="k">' + esc(n.label) + '</span>' +
          '<div class="body' + (longish ? ' clamp' : '') + '" id="' + nid + '">' + esc(v) + '</div>' +
          (longish ? '<button class="more" data-t="' + nid + '">もっと見る</button>' : '');
        if (n.ai) {
          notesHtml += '<div class="ai-foot"><button class="copy" data-c="' + nid + '">コピー</button></div>';
        }
        notesHtml += '</div>';
      });
      if (notesHtml) c += '<div class="notes">' + notesHtml + '</div>';

      c += '<div class="card-foot">';
      c += '<span class="stamp">' + (String(stamp).trim() ? '更新 ' + esc(stamp) : '') + '</span>';
      c += '<button class="edit-btn" data-i="' + idx + '">編集</button>';
      c += '</div></div>';
      out += c;
    });
    $('list').innerHTML = out;

    [].forEach.call(document.querySelectorAll('.edit-btn'), function (b) {
      b.onclick = function () { openEdit(parseInt(b.getAttribute('data-i'), 10)); };
    });
    [].forEach.call(document.querySelectorAll('.more'), function (b) {
      b.onclick = function () {
        var body = $(b.getAttribute('data-t'));
        var open = body.classList.toggle('clamp') === false;
        b.textContent = open ? '閉じる' : 'もっと見る';
        equalizeCardSections();
      };
    });
    [].forEach.call(document.querySelectorAll('.copy'), function (b) {
      b.onclick = function () { copyText(state.noteText[b.getAttribute('data-c')] || ''); };
    });
    // カード押下で詳細を新規ブラウザタブで開く（一覧ビューのみ）。ボタン・リンク・
    // テキスト選択中のクリックは詳細を開かない。
    if (!detail) {
      [].forEach.call(document.querySelectorAll('.card[data-row]'), function (el) {
        el.onclick = function (ev) {
          if (ev.target.closest && ev.target.closest('a, button, select, input, textarea')) return;
          if (window.getSelection && String(window.getSelection()).length) return;
          openDetail(parseInt(el.getAttribute('data-row'), 10));
        };
      });
    }
    equalizeCardSections();
  }

  // グリッド表示では行内のカード高さは揃う（align-items: stretch）が、指標数や
  // 理由文の長さが違うと内部の境界（.notes の点線・フッター）がずれる。行ごとに
  // .grid / .notes / .theme の min-height を行内最大値に合わせて境界線を揃える。
  function equalizeCardSections() {
    var sections = ['.theme', '.grid', '.notes'];
    [].forEach.call(
      document.querySelectorAll('.card .theme, .card .grid, .card .notes'),
      function (el) { el.style.minHeight = ''; });
    if (state.detailRow || window.innerWidth < 900) return;
    var rows = {};
    [].forEach.call(document.querySelectorAll('.card'), function (c) {
      var top = Math.round(c.getBoundingClientRect().top);
      (rows[top] = rows[top] || []).push(c);
    });
    Object.keys(rows).forEach(function (k) {
      var group = rows[k];
      if (group.length < 2) return;
      sections.forEach(function (sel) {
        var els = group.map(function (c) { return c.querySelector(sel); });
        if (els.some(function (e) { return !e; })) return;
        var max = Math.max.apply(null, els.map(function (e) { return e.offsetHeight; }));
        els.forEach(function (e) { e.style.minHeight = max + 'px'; });
      });
    });
  }

  var eqTimer = null;
  window.addEventListener('resize', function () {
    clearTimeout(eqTimer);
    eqTimer = setTimeout(equalizeCardSections, 150);
  });

  // ---- editor ----
  function refreshProgress() {
    if (!state.required.length) {
      $('progress').innerHTML = '';
      return;
    }
    var filled = 0;
    state.required.forEach(function (label) {
      var el = document.querySelector('[data-h="' + label + '"]');
      if (el && String(el.value).trim()) filled++;
    });
    var dots = '';
    for (var i = 0; i < state.required.length; i++) {
      dots += '<span class="dot' + (i < filled ? ' on' : '') + '"></span>';
    }
    $('progress').innerHTML = '<span class="txt">必須項目 ' + filled + '/' +
      state.required.length + '</span><span class="dots">' + dots + '</span>';
  }

  function buildReference(byLabel) {
    var ro = $('roFields'); var rows = '';
    state.headers.forEach(function (h) {
      if (h.editable) return;
      var cell = byLabel[h.label];
      var v = cell && cell.val != null ? String(cell.val) : '';
      if (!v.trim()) return;
      rows += '<div class="row"><span class="rk">' + esc(h.label) + '</span>' +
        '<span class="rv">' + valueHtml(v) + '</span></div>';
    });
    if (rows) {
      ro.innerHTML = '<div class="h">参考（自動更新・編集不可）</div>' +
        '<div class="note-line">これらの項目は Excel シートと yfinance / AI で自動同期されます。</div>' + rows;
      ro.style.display = 'block';
    } else {
      ro.innerHTML = ''; ro.style.display = 'none';
    }
  }

  function openEdit(idx) {
    var row = state.view[idx];
    state.editing = row.row; state.original = {}; state.required = [];
    var byLabel = byLabelOf(state.headers, row.cells);
    var name = byLabel[ROLE.name] ? byLabel[ROLE.name].val : '';
    var ticker = byLabel[ROLE.ticker] ? byLabel[ROLE.ticker].val : '';
    $('eyebrow').textContent = '編集モード';
    $('sheetTitle').innerHTML = esc(name || ('行 ' + row.row)) +
      (ticker ? '<small>（' + esc(ticker) + '）</small> ' : ' ') + '<small>を編集</small>';

    var form = $('formFields'); form.innerHTML = '';
    state.headers.forEach(function (h) {
      if (!h.editable) return;
      var cell = byLabel[h.label];
      var val = cell && cell.val != null ? cell.val : '';
      state.original[h.label] = val;
      var wrap = document.createElement('div');
      wrap.className = 'fld';
      wrap.innerHTML = fieldHtml(h.label, val, false);
      form.appendChild(wrap);
    });
    $('dangerZone').style.display = 'block';
    resetDelete();
    buildReference(byLabel);
    refreshProgress();
    openSheet();
  }

  function openAdd() {
    state.editing = 'new'; state.original = {};
    state.required = isHistoryTab()
      ? ['日付', ROLE.name, BUY_SELL, '約定単価', '株数']
      : [ROLE.name];
    $('eyebrow').textContent = '新規登録';
    var addLabel = isHistoryTab() ? ' <small>に取引を追加</small>' : ' <small>に銘柄を追加</small>';
    $('sheetTitle').innerHTML = esc(state.tab) + addLabel;
    $('dangerZone').style.display = 'none';
    var form = $('formFields'); form.innerHTML = '';
    state.headers.forEach(function (h) {
      if (!h.editable) return;
      // 売買履歴は Ticker を手入力する（自動解決しない）。他タブは register-ticker
      // スキルが後で埋めるため Ticker 入力を隠す。
      if (h.label === ROLE.ticker && !isHistoryTab()) return;
      var wrap = document.createElement('div');
      wrap.className = 'fld';
      wrap.innerHTML = fieldHtml(h.label, '', state.required.indexOf(h.label) >= 0);
      form.appendChild(wrap);
      state.original[h.label] = '';
    });
    var ro = $('roFields');
    if (isHistoryTab()) {
      ro.innerHTML = ''; ro.style.display = 'none';
    } else {
      ro.innerHTML = '<div class="h">Ticker はあとで自動解決します</div>' +
        '<div class="note-line">register-ticker スキルが候補を提示 → 選択 → 自動更新されます。</div>';
      ro.style.display = 'block';
    }
    refreshProgress();
    openSheet();
  }

  function openSheet() {
    $('scrim').classList.add('open'); $('sheet').classList.add('open');
    $('formFields').addEventListener('input', refreshProgress);
  }
  function closeSheet() {
    $('scrim').classList.remove('open'); $('sheet').classList.remove('open');
    $('formFields').removeEventListener('input', refreshProgress);
    resetDelete();
    state.editing = null;
  }

  // POSITIVE_NUM_FIELDS のうち入力されているものが正の数か検証する。最初に違反した
  // フィールドのエラーメッセージを返す（無ければ null）。判定は sortlib の純関数
  // isPositiveNumberStr に委譲（Node でテスト済み）。
  function numericFieldError(fields) {
    for (var i = 0; i < POSITIVE_NUM_FIELDS.length; i++) {
      var f = POSITIVE_NUM_FIELDS[i];
      if (fields[f] == null || String(fields[f]).trim() === '') continue;
      if (!isPositiveNumberStr(fields[f])) return f + 'は正の数を入力してください';
    }
    return null;
  }

  function saveNew() {
    var fields = {};
    [].forEach.call(document.querySelectorAll('[data-h]'), function (el) {
      if (String(el.value).trim()) fields[el.getAttribute('data-h')] = el.value;
    });
    // 必須項目チェック（タブごとに state.required を openAdd で設定済み）。
    for (var i = 0; i < state.required.length; i++) {
      var rq = state.required[i];
      if (!fields[rq] || !String(fields[rq]).trim()) {
        toast(rq + 'を入力してください'); return;
      }
    }
    // 数値項目（約定単価/株数）は正の数であること。
    var numErr = numericFieldError(fields);
    if (numErr) { toast(numErr); return; }
    runSave('追加中…', '追加しました', '追加に失敗: ', function (runner) {
      runner.addRow(state.tab, fields);
    });
  }

  function save() {
    if (state.editing === 'new') { saveNew(); return; }
    var changed = {};
    [].forEach.call(document.querySelectorAll('[data-h]'), function (el) {
      var h = el.getAttribute('data-h');
      if (el.value !== state.original[h]) changed[h] = el.value;
    });
    if (Object.keys(changed).length === 0) { closeSheet(); return; }
    var numErr = numericFieldError(changed);
    if (numErr) { toast(numErr); return; }
    runSave('保存中…', '保存しました', '保存に失敗: ', function (runner) {
      runner.saveRow(state.tab, state.editing, changed);
    });
  }

  var delConfirm = false;
  function resetDelete() {
    delConfirm = false;
    var b = $('deleteBtn');
    b.disabled = false;
    b.classList.remove('confirm');
    b.textContent = isHistoryTab() ? 'この取引を削除' : 'この銘柄を削除';
  }
  function onDeleteClick() {
    var b = $('deleteBtn');
    if (!delConfirm) { // 1st tap: arm confirmation
      delConfirm = true;
      b.classList.add('confirm');
      b.textContent = 'この操作は取り消せません — 削除する';
      return;
    }
    // 2nd tap: execute. Identity = openEdit 時にキャプチャした全 editable 列の
    // CURRENT シート値（state.original。ライブ入力ではない）なので、サーバが読み直す
    // 値と一致する。取引台帳は同じ ticker+name が複数行に現れるため、全 editable 列の
    // タプルでないと一意に同定できない。
    var tab = state.tab, rowNum = state.editing;
    var ident = {};
    Object.keys(state.original).forEach(function (k) {
      ident[k] = state.original[k] == null ? '' : state.original[k];
    });
    b.disabled = true; b.classList.remove('confirm'); b.textContent = '削除中…';
    google.script.run.withSuccessHandler(function () {
      closeSheet(); toast('削除しました'); load();
    }).withFailureHandler(function (e) {
      closeSheet(); toast('削除に失敗: ' + errMsg(e)); load();
    }).deleteRow(tab, rowNum, ident);
  }

  function fail(e) {
    $('list').innerHTML = '<div class="empty"><div class="ico">⚠️</div><div>' +
      esc('読み込みエラー: ' + errMsg(e)) + '</div></div>';
  }

  $('cancelBtn').onclick = closeSheet;
  $('closeBtn').onclick = closeSheet;
  $('saveBtn').onclick = save;
  $('deleteBtn').onclick = onDeleteClick;
  $('addFab').onclick = openAdd;
  $('scrim').onclick = closeSheet;
  $('sortSel').onchange = function () { state.sortKey = this.value || null; render(); };
  $('sortDir').onclick = function () {
    state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
    this.textContent = dirGlyph();
    render();
  };
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeSheet();
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && state.editing != null) {
      e.preventDefault(); save();
    }
  });
  init();
