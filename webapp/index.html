<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    :root { --bd: #d0d7de; --hd: #f3f6fa; --ed: #fff8e1; --accent: #0969da; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
           margin: 0; color: #1f2328; font-size: 14px; }
    header { position: sticky; top: 0; background: #fff; border-bottom: 1px solid var(--bd);
             padding: 10px 12px; z-index: 5; }
    h1 { font-size: 16px; margin: 0 0 8px; }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab { padding: 6px 12px; border: 1px solid var(--bd); border-radius: 16px;
           background: #fff; cursor: pointer; font-size: 13px; }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    #status { padding: 8px 12px; color: #57606a; }
    .table-wrap { overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid var(--bd); padding: 6px 8px; white-space: nowrap;
             text-align: left; vertical-align: top; }
    th { background: var(--hd); position: sticky; top: 0; font-weight: 600; }
    th.editable::after { content: " ✎"; color: var(--accent); font-size: 11px; }
    td.editable { background: var(--ed); }
    .edit-btn { padding: 4px 10px; border: 1px solid var(--accent); color: var(--accent);
                background: #fff; border-radius: 6px; cursor: pointer; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: none;
               align-items: flex-start; justify-content: center; z-index: 10; padding: 16px; }
    .overlay.open { display: flex; }
    .panel { background: #fff; border-radius: 10px; max-width: 520px; width: 100%;
             max-height: 90vh; overflow-y: auto; padding: 16px; }
    .panel h2 { font-size: 15px; margin: 0 0 12px; }
    .fld { margin-bottom: 12px; }
    .fld label { display: block; font-weight: 600; margin-bottom: 4px; }
    .fld input, .fld textarea { width: 100%; padding: 8px; border: 1px solid var(--bd);
                                border-radius: 6px; font: inherit; }
    .fld textarea { min-height: 64px; resize: vertical; }
    .ro { color: #57606a; font-size: 12px; margin: 10px 0; }
    .ro div { padding: 2px 0; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
    .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; border: 1px solid var(--bd);
           background: #fff; }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn[disabled] { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>Stock Sheet</h1>
    <div class="tabs" id="tabs"></div>
  </header>
  <div id="status">読み込み中…</div>
  <div class="table-wrap"><table id="grid"></table></div>

  <div class="overlay" id="overlay">
    <div class="panel">
      <h2 id="panelTitle">編集</h2>
      <div id="formFields"></div>
      <div class="ro" id="roFields"></div>
      <div class="actions">
        <button class="btn" id="cancelBtn">キャンセル</button>
        <button class="btn primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

<script>
  var state = { tab: null, headers: [], rows: [], editing: null, original: {} };

  function setStatus(msg) { document.getElementById('status').textContent = msg || ''; }

  function init() {
    google.script.run.withSuccessHandler(function (tabs) {
      var box = document.getElementById('tabs');
      tabs.forEach(function (t, i) {
        var b = document.createElement('button');
        b.className = 'tab' + (i === 0 ? ' active' : '');
        b.textContent = t;
        b.onclick = function () { selectTab(t, b); };
        box.appendChild(b);
      });
      if (tabs.length) selectTab(tabs[0], box.firstChild);
    }).withFailureHandler(fail).getTabs();
  }

  function selectTab(tab, btn) {
    state.tab = tab;
    [].forEach.call(document.querySelectorAll('.tab'), function (e) { e.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    load();
  }

  function load() {
    setStatus('読み込み中…');
    document.getElementById('grid').innerHTML = '';
    google.script.run.withSuccessHandler(function (data) {
      state.headers = data.headers;
      state.rows = data.rows;
      render();
      setStatus(data.rows.length + ' 行');
    }).withFailureHandler(fail).getRows(state.tab);
  }

  function render() {
    var t = document.getElementById('grid');
    var thead = '<thead><tr><th></th>';
    state.headers.forEach(function (h) {
      thead += '<th class="' + (h.editable ? 'editable' : '') + '">' + esc(h.label) + '</th>';
    });
    thead += '</tr></thead>';
    var body = '<tbody>';
    state.rows.forEach(function (row, idx) {
      body += '<tr><td><button class="edit-btn" data-i="' + idx + '">編集</button></td>';
      row.cells.forEach(function (c, ci) {
        var ed = state.headers[ci] && state.headers[ci].editable;
        body += '<td class="' + (ed ? 'editable' : '') + '">' + esc(c) + '</td>';
      });
      body += '</tr>';
    });
    body += '</tbody>';
    t.innerHTML = thead + body;
    [].forEach.call(t.querySelectorAll('.edit-btn'), function (b) {
      b.onclick = function () { openEdit(parseInt(b.getAttribute('data-i'), 10)); };
    });
  }

  function openEdit(idx) {
    var row = state.rows[idx];
    state.editing = row.row;
    state.original = {};
    document.getElementById('panelTitle').textContent = state.tab + ' — 行 ' + row.row + ' を編集';
    var form = document.getElementById('formFields');
    var ro = document.getElementById('roFields');
    form.innerHTML = '';
    ro.innerHTML = '<div style="font-weight:600;margin-bottom:4px;">参考（編集不可）</div>';
    state.headers.forEach(function (h, ci) {
      var val = row.cells[ci] == null ? '' : row.cells[ci];
      if (h.editable) {
        state.original[h.label] = val;
        var wrap = document.createElement('div');
        wrap.className = 'fld';
        var long = h.label === '購入検討理由' || h.label === '購入理由';
        wrap.innerHTML = '<label>' + esc(h.label) + '</label>' +
          (long ? '<textarea data-h="' + esc(h.label) + '">' + esc(val) + '</textarea>'
                : '<input data-h="' + esc(h.label) + '" value="' + esc(val) + '">');
        form.appendChild(wrap);
      } else if (String(val).trim()) {
        var d = document.createElement('div');
        d.textContent = h.label + ': ' + val;
        ro.appendChild(d);
      }
    });
    document.getElementById('overlay').classList.add('open');
  }

  function closeEdit() {
    document.getElementById('overlay').classList.remove('open');
    state.editing = null;
  }

  function save() {
    var changed = {};
    [].forEach.call(document.querySelectorAll('[data-h]'), function (el) {
      var h = el.getAttribute('data-h');
      if (el.value !== state.original[h]) changed[h] = el.value;
    });
    if (Object.keys(changed).length === 0) { closeEdit(); return; }
    var btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = '保存中…';
    google.script.run.withSuccessHandler(function () {
      btn.disabled = false; btn.textContent = '保存';
      closeEdit(); load();
    }).withFailureHandler(function (e) {
      btn.disabled = false; btn.textContent = '保存';
      alert('保存に失敗しました: ' + (e && e.message ? e.message : e));
    }).saveRow(state.tab, state.editing, changed);
  }

  function fail(e) { setStatus('エラー: ' + (e && e.message ? e.message : e)); }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }

  document.getElementById('cancelBtn').onclick = closeEdit;
  document.getElementById('saveBtn').onclick = save;
  document.getElementById('overlay').addEventListener('click', function (e) {
    if (e.target.id === 'overlay') closeEdit();
  });
  init();
</script>
</body>
</html>
